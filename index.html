<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowGrad | Mezuniyet Elbisesi Rehberi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fce4ec;
            --primary-dark: #f06292;
            --accent: #d4af37;
            --text: #4a4a4a;
            --bg: #fffcfd;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, #f8bbd0 0%, transparent 25%),
                radial-gradient(circle at 100% 100%, #d4af3722 0%, transparent 25%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(240, 98, 146, 0.1);
            text-align: center;
            border: 1px solid #f8bbd055;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.6s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #555;
        }

        /* Slider Styles */
        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            height: 6px;
            background: #f1f1f1;
            border-radius: 5px;
            outline: none;
            margin-bottom: 10px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--primary-dark);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(240, 98, 146, 0.3);
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #bbb;
            margin-bottom: 40px;
        }

        /* Button Styles */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 20px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn-option {
            background: #fff;
            color: var(--primary-dark);
            border: 2px solid var(--primary);
        }

        .btn-option.selected {
            background: var(--primary-dark);
            color: white;
            border-color: var(--primary-dark);
        }

        .btn-next {
            background: var(--accent);
            color: white;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .result-box {
            background: #fff9fa;
            border: 2px dashed var(--primary);
            padding: 30px;
            border-radius: 25px;
            margin: 20px 0;
        }

        .result-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .icon { font-size: 3.5rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GlowGrad</h1>
        <p class="subtitle">Stil Asistanın</p>

        <!-- Soru 1: Style Score x -->
        <div id="step1" class="step active">
            <div class="icon">✨</div>
            <label>Tarzın hangi yönde?</label>
            <input type="range" id="x" min="1" max="10" value="5">
            <div class="slider-labels">
                <span>Klasik/Zamansız (L)</span>
                <span>Modern/Trend (T)</span>
            </div>
            <button class="btn-next" onclick="move(1, 2)">Devam Et</button>
        </div>

        <!-- Soru 2: Venue Type y -->
        <div id="step2" class="step">
            <div class="icon">📍</div>
            <label>Mezuniyet nerede?</label>
            <div class="btn-group">
                <button class="btn-option" id="y1" onclick="setY(1)">İç Mekan (I)</button>
                <button class="btn-option" id="y0" onclick="setY(0)">Dış Mekan (O)</button>
            </div>
            <button class="btn-next" id="next2" disabled onclick="move(2, 3)">Devam Et</button>
        </div>

        <!-- Soru 3: Priority z -->
        <div id="step3" class="step">
            <div class="icon">🎀</div>
            <label>Hangisi senin için daha önemli?</label>
            <div class="btn-group">
                <button class="btn-option" id="z1" onclick="setZ(1)">Rahatlık & Dans (C)</button>
                <button class="btn-option" id="z0" onclick="setZ(0)">Göz Alıcı Şıklık (S)</button>
            </div>
            <button class="btn-next" id="next3" disabled onclick="showResult()">Sonucu Gör</button>
        </div>

        <!-- Result Page -->
        <div id="step4" class="step">
            <div class="icon">👸</div>
            <div class="result-box">
                <p style="font-size: 0.7rem; color: var(--primary-dark); font-weight: bold;">ÖNERİMİZ:</p>
                <div id="res-title" class="result-title">...</div>
                <p id="res-desc" style="font-size: 0.9rem; color: #666;"></p>
            </div>
            <button class="btn-next" onclick="location.reload()">Baştan Dene</button>
        </div>
    </div>

    <script>
        let data = { x: 5, y: null, z: null };

        function move(c, n) {
            document.getElementById('step'+c).classList.remove('active');
            document.getElementById('step'+n).classList.add('active');
        }

        function setY(v) {
            data.y = v;
            document.getElementById('y1').className = v==1 ? 'btn-option selected' : 'btn-option';
            document.getElementById('y0').className = v==0 ? 'btn-option selected' : 'btn-option';
            document.getElementById('next2').disabled = false;
        }

        function setZ(v) {
            data.z = v;
            document.getElementById('z1').className = v==1 ? 'btn-option selected' : 'btn-option';
            document.getElementById('z0').className = v==0 ? 'btn-option selected' : 'btn-option';
            document.getElementById('next3').disabled = false;
        }

        function showResult() {
            data.x = parseInt(document.getElementById('x').value);
            let k = "";
            
            // Logic based on Figma Flowchart
            if(data.x > 5) { // Trendy (T)
                if(data.y == 1) { // Indoors (I)
                    k = (data.z == 1 ? 'CO' : 'BD');
                } else { // Outdoors (O)
                    k = (data.z == 1 ? 'LS' : 'OD');
                }
            } else { // Timeless (L)
                if(data.y == 1) { // Indoors (I)
                    k = (data.z == 1 ? 'SD' : 'ID');
                } else { // Outdoors (O)
                    k = (data.z == 1 ? 'LO' : 'TD');
                }
            }

            const r = {
                'CO': ['Rahat Kombin', 'Trendy, konforlu ve şık! Gecenin en rahat ama en tarz ismi sen olacaksın.'],
                'BD': ['Cesur Trend Elbise', 'Tüm bakışlar üzerinde! Sezonun en hit parçalarıyla fark yaratma vakti.'],
                'LS': ['Hafif Şık Takım', 'Açık havada seni yormayacak, modern ve uçuş uçuş bir görünüm.'],
                'OD': ['Dış Mekan Elbisesi', 'Doğa ve şıklık bir arada. Dış mekan ışığında parlayacak trend bir seçim.'],
                'SD': ['Sade ve Şık Elbise', 'Zarafetin en saf hali. Minimalist bir şıklıkla zamansız bir duruş.'],
                'ID': ['Zarif Salon Elbisesi', 'Klasik bir salon mezuniyeti için en sofistike ve asil tercih.'],
                'LO': ['Katmanlı Stil', 'Hem klasik hem fonksiyonel. Dış mekanın havasına uyumlu, zamansız bir kombin.'],
                'TD': ['Zamansız Gece Elbisesi', 'Yıllar sonra bile modası geçmeyecek, fotoğraflarda kusursuz duracak bir klasik.']
            };

            document.getElementById('res-title').innerText = r[k][0];
            document.getElementById('res-desc').innerText = r[k][1];
            move(3, 4);
        }
    </script>
</body>
</html>
