<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmir Soulmate Compass</title>
    <!-- Romantic & Fairytale Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --passion-pink: #ff69b4;
            --fairytale-purple: #4b0082;
            --dreamy-burgundy: #6a040f;
            --gold-glow: #ffd700;
            --ivory-silk: #fffaf0;
            --magic-white: rgba(255, 255, 255, 0.8);
        }

        /* Standard cursor hidden for the magic thread */
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

        body {
            background: #020000;
            color: var(--ivory-silk);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow: hidden; /* Prevent scroll for immersion */
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        /* --- IMMERSIVE DEEP BACKGROUND --- */
        #magic-bg {
            position: fixed;
            inset: -100px;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0505 0%, #020000 100%);
            transition: transform 0.2s ease-out;
        }

        /* Twinkling Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.3); }
            50% { opacity: var(--max-op); transform: scale(1); box-shadow: 0 0 10px white; }
        }

        /* Floating Nebulas */
        .nebula {
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.8s ease, visibility 1.8s;
        }

        #intro-message {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(2rem, 8vw, 3.2rem);
            color: var(--gold-glow);
            text-align: center;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulseText 4s infinite;
            padding: 40px;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.2; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1.04); }
        }

        /* --- KADER İPİ (RED THREAD) --- */
        .thread-node {
            position: fixed;
            width: 6px; height: 6px;
            background: #ff0000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10005;
            box-shadow: 0 0 15px #ff0000;
            transform: translate(-50%, -50%);
            opacity: var(--op);
        }

        /* --- UI CONTAINER --- */
        .container {
            width: 90%; max-width: 620px;
            background: rgba(15, 2, 2, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: clamp(30px, 5vw, 45px);
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            text-align: center;
            opacity: 0; transform: translateY(50px) rotateX(10deg);
            transition: all 1.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 200;
            max-height: 90vh;
            overflow-y: auto;
        }
        .container::-webkit-scrollbar { width: 0; } /* Hide scrollbar */
        .container.active { opacity: 1; transform: translateY(0) rotateX(0); }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 9vw, 3.8rem);
            color: var(--gold-glow);
            margin-bottom: 5px;
        }

        .subtitle { font-family: 'Pinyon Script', cursive; font-size: 1.6rem; color: #ffb7c5; margin-bottom: 30px; }

        /* --- FORM --- */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; text-align: left; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        label { font-family: 'Cinzel Decorative', serif; font-size: 0.65rem; color: var(--gold-glow); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        
        select {
            width: 100%; padding: 12px;
            background: rgba(20, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            color: var(--ivory-silk);
            font-family: 'Montserrat', sans-serif;
            outline: none;
            transition: 0.3s;
            font-size: 0.75rem;
        }
        select:focus { border-color: var(--gold-glow); background: rgba(40, 0, 0, 0.7); }

        .btn-magic {
            grid-column: 1 / -1;
            padding: 18px;
            margin-top: 20px;
            background: linear-gradient(135deg, #5e0b11, #32020a);
            border: 1px solid var(--gold-glow);
            border-radius: 50px;
            color: var(--gold-glow);
            font-family: 'Cinzel Decorative', serif;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.5s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-magic:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2); }

        /* --- RESULT --- */
        #result-card { display: none; animation: popIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .result-img {
            width: 100%; height: 260px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid var(--gold-glow);
            margin-bottom: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }
        .result-title { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--gold-glow); margin-bottom: 5px; }
        .result-desc { font-style: italic; color: #ffb7c5; font-size: 1rem; line-height: 1.6; margin-bottom: 25px; }

        /* --- FINAL EXPLOSION PARTICLES --- */
        .final-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10010;
            font-size: 2rem;
            animation: finalFly 2s ease-out forwards;
        }
        @keyframes finalFly {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(2) rotate(var(--tr)); opacity: 0; }
        }

        /* --- LANTERN --- */
        .lantern-area { margin-top: 40px; padding-top: 30px; border-top: 1px solid rgba(255, 215, 0, 0.1); }
        .wish-lantern {
            background: linear-gradient(to bottom, #ffcc33, #ff6600);
            padding: 20px; border-radius: 50% 50% 15% 15%;
            color: #2d0b0b;
            font-family: 'Pinyon Script', cursive; font-size: 1.6rem;
            box-shadow: 0 0 40px rgba(255, 150, 0, 0.4);
            max-width: 280px; margin: 0 auto;
            animation: lanternFloat 6s infinite ease-in-out;
            border: 1px solid #ffd700;
        }
        @keyframes lanternFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }
        .wish-lantern input {
            background: rgba(255,255,255,0.2); border: none; border-bottom: 1px solid #2d0b0b;
            width: 80%; text-align: center; color: #2d0b0b; font-family: 'Montserrat'; font-size: 0.8rem;
            outline: none; margin-bottom: 10px; font-weight: 600;
        }

        #vibe-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 40px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.1);
        }
        .vibe-icon { font-size: 1.2rem; transition: 0.3s; }
        .vibe-icon:hover { transform: scale(1.3); color: var(--gold-glow); }

    </style>
</head>
<body>

    <div id="magic-bg">
        <div class="nebula" style="top: -10%; left: -10%; background: var(--passion-pink);"></div>
        <div class="nebula" style="bottom: -10%; right: -10%; background: #240046;"></div>
    </div>

    <!-- Intro -->
    <div id="intro-overlay" onclick="revealApp()">
        <div id="intro-message">Touch to begin your convergence...</div>
    </div>

    <audio id="ocean-waves" loop muted><source src="https://assets.mixkit.co/active_storage/sfx/2513/2513-preview.mp3" type="audio/mpeg"></audio>

    <div class="container" id="app-content">
        <h1>Izmir Soulmate Compass</h1>
        <p class="subtitle">The Aegean winds are whispering...</p>

        <form id="soul-form" class="form-grid">
            <!-- Questions updated to user request -->
            <div class="field">
                <label>1. Persona / Life Stage (x)</label>
                <select id="x" required>
                    <option value="S">Young Students (Energetic, campus-focused)</option>
                    <option value="W">White-Collar Pros (Corporate, networking-oriented)</option>
                    <option value="A">Refined Adults (Seeking quality and maturity)</option>
                    <option value="N">The Nostalgics (Vintage souls, lovers of Old İzmir)</option>
                    <option value="C">Creative Souls (Artists, designers, and dreamers)</option>
                </select>
            </div>
            
            <div class="field">
                <label>2. Social Pulse / Density (y)</label>
                <select id="y" required>
                    <option value="K">Chaos (High energy, crowded, loud)</option>
                    <option value="R">Rhythmic (Steady flow, lively but balanced)</option>
                    <option value="L">Lounge (Relaxed, chilled, easy-going)</option>
                    <option value="Q">Quiet (Isolated, intimate, peaceful)</option>
                </select>
            </div>

            <div class="field">
                <label>3. Budget / Financial Context (f)</label>
                <select id="f" required>
                    <option value="GR">Grass-root (Affordable, student-friendly, casual)</option>
                    <option value="ML">Mid-level (Standard bistro/café pricing)</option>
                    <option value="EX">Executive (High-end, luxury, premium)</option>
                    <option value="HG">Hidden Gem (Value-driven, unique finds over price)</option>
                </select>
            </div>

            <div class="field">
                <label>4. Music Type (m)</label>
                <select id="m" required>
                    <option value="G">Analog (Vinyl, retro radio, nostalgic vibes)</option>
                    <option value="J">Digital (Electronic, techno, modern beats)</option>
                    <option value="U">Nature (Sea waves, wind, natural ambience)</option>
                    <option value="V">Acoustic (Live performance, guitar, raw vocals)</option>
                </select>
            </div>

            <div class="field">
                <label>5. Style Match / Fashion Vibe (s)</label>
                <select id="s" required>
                    <option value="BO">Boho (Eclectic, free-spirited, artistic)</option>
                    <option value="MN">Minimalist (Sleek, clean, sophisticated)</option>
                    <option value="CY">Cyber-Street (Modern, futuristic, streetwear)</option>
                    <option value="CH">Classic Chic (Elegant, formal, polished)</option>
                </select>
            </div>

            <div class="field">
                <label>6. View Preference (p)</label>
                <select id="p" required>
                    <option value="PL">Panoramic Lights (Cityscape, birds-eye view)</option>
                    <option value="OH">Ocean Horizon (Direct sea view, ferries, sunset)</option>
                    <option value="TX">Texture (Historical architecture, narrow stone streets)</option>
                    <option value="GO">Green Oasis (Parks, gardens, botanical vibes)</option>
                </select>
            </div>

            <div class="field" style="grid-column: span 2;">
                <label>7. Time of Day (t)</label>
                <select id="t" required>
                    <option value="AM">Golden Morning (Brunch, coffee, early sunshine)</option>
                    <option value="PM">Sunset / Nightfall (Evening drinks, city lights, nightlife)</option>
                </select>
            </div>
            
            <button type="submit" class="btn-magic">Show My Destiny</button>
        </form>

        <div id="result-card">
            <h2 id="res-name" class="result-title"></h2>
            <img id="res-img" class="result-img" src="" alt="Fate Venue">
            <p id="res-desc" class="result-desc"></p>
            <button onclick="location.reload()" class="btn-magic" style="width: auto; padding: 15px 40px;">Restart Journey</button>
        </div>

        <div class="lantern-area">
            <div class="wish-lantern" id="wish-box">
                <p style="margin-bottom: 8px;">Make a Wish...</p>
                <input type="text" id="wish-text" placeholder="Type here...">
                <button onclick="sendWish()" style="background:none; border:1px solid #2d0b0b; padding: 5px 15px; border-radius: 20px; font-weight: bold; width: 100%; font-family: 'Montserrat'; font-size: 0.7rem;">RELEASE TO THE SKY ✨</button>
            </div>
        </div>
        
        <p style="font-size: 0.55rem; margin-top: 30px; opacity: 0.3; letter-spacing: 4px;">CONVERGENCE PROTOCOL • 2026</p>
    </div>

    <div id="vibe-bar">
        <span class="vibe-icon" onclick="toggleMute()" id="mute-icon">🔇</span>
        <span class="vibe-icon" onclick="location.reload()">🔄</span>
    </div>

    <script>
        // --- STAR GENERATOR ---
        function createStars() {
            const bg = document.getElementById('magic-bg');
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--max-op', Math.random() * 0.7 + 0.3);
                star.style.animationDelay = Math.random() * 5 + 's';
                bg.appendChild(star);
            }
        }

        // --- PARALLAX ---
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 60;
            const y = (window.innerHeight / 2 - e.clientY) / 60;
            document.getElementById('magic-bg').style.transform = `translate(${x}px, ${y}px)`;
        });

        // --- MAGIC THREAD ---
        const coords = { x: window.innerWidth/2, y: window.innerHeight/2 };
        const circles = [];
        const circleCount = 15;

        for (let i = 0; i < circleCount; i++) {
            const div = document.createElement('div');
            div.className = 'thread-node';
            div.style.setProperty('--op', (circleCount - i) / circleCount);
            document.body.appendChild(div);
            circles.push({ x: coords.x, y: coords.y, element: div });
        }

        window.addEventListener("mousemove", (e) => {
            coords.x = e.clientX;
            coords.y = e.clientY;
        });

        function animateCircles() {
            let x = coords.x;
            let y = coords.y;
            circles.forEach(function(circle, index) {
                circle.element.style.left = x + "px";
                circle.element.style.top = y + "px";
                circle.element.style.transform = `translate(-50%, -50%) scale(${(circleCount - index) / circleCount})`;
                circle.x = x; circle.y = y;
                const nextCircle = circles[index + 1] || circles[0];
                x += (nextCircle.x - x) * 0.3;
                y += (nextCircle.y - y) * 0.3;
            });
            requestAnimationFrame(animateCircles);
        }

        // --- FINAL EXPLOSION (Hearts, Stars, Questions) ---
        function createFinalExplosion() {
            const emojis = ['❤', '⭐', '❓', '✨', '💖', '💫'];
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'final-particle';
                p.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                
                const tx = (Math.random() - 0.5) * 600;
                const ty = (Math.random() - 0.5) * 600;
                const tr = Math.random() * 1000;
                
                p.style.left = centerX + 'px';
                p.style.top = centerY + 'px';
                p.style.setProperty('--tx', tx + 'px');
                p.style.setProperty('--ty', ty + 'px');
                p.style.setProperty('--tr', tr + 'deg');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        // --- APP LOGIC ---
        let revealed = false;
        function revealApp() {
            if(revealed) return;
            revealed = true;
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = 'none';
                document.getElementById('app-content').classList.add('active');
                try { document.getElementById('ocean-waves').play(); } catch(e) {}
            }, 1200);
        }

        const venues = [
            { id: "S-K-GR-J-CY-OH-PM", name: "Kordon Sunset 🌅", desc: "Digital beats meet the waves. Your soulmate is laughing at the sunset with a casual drink.", img: "https://images.unsplash.com/photo-1590603740183-980e7f6920eb?w=800" },
            { id: "W-R-ML-J-MN-PL-PM", name: "Mistral Sky Lounge 🥂", desc: "Corporate elegance with a view. Look for a sleek profile against the city lights.", img: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" },
            { id: "C-Q-HG-V-BO-TX-PM", name: "Daragac Art Studio 🎨", desc: "In the narrow streets of art, creative sparks fly. Someone is waiting for a shared vision.", img: "https://images.unsplash.com/photo-1513364238172-c8f48117193b?w=800" }
        ];

        document.getElementById('soul-form').onsubmit = (e) => {
            e.preventDefault();
            const selection = [
                document.getElementById('x').value,
                document.getElementById('y').value,
                document.getElementById('f').value,
                document.getElementById('m').value,
                document.getElementById('s').value,
                document.getElementById('p').value,
                document.getElementById('t').value
            ].join('-');

            // Large Reveal
            setTimeout(() => {
                const match = venues.find(v => v.id === selection) || venues[Math.floor(Math.random()*venues.length)];
                document.getElementById('soul-form').style.display = 'none';
                document.getElementById('result-card').style.display = 'block';
                document.getElementById('res-name').innerText = match.name;
                document.getElementById('res-img').src = match.img;
                document.getElementById('res-desc').innerText = match.desc;
                
                createFinalExplosion(); // The big requested explosion only here
            }, 1000);
        };

        function toggleMute() {
            const ocean = document.getElementById('ocean-waves');
            ocean.muted = !ocean.muted;
            document.getElementById('mute-icon').innerText = ocean.muted ? '🔇' : '🔊';
        }

        function sendWish() {
            const input = document.getElementById('wish-text');
            if(!input.value) return;
            const wish = input.value;
            const box = document.getElementById('wish-box');
            box.style.transform = 'translateY(-800px) scale(0) rotate(20deg)';
            box.style.opacity = '0';
            setTimeout(() => {
                box.innerHTML = `<div style="font-size:1rem; padding:10px;">"${wish}"<br>Is now a star in the Aegean sky. ✨</div>`;
                box.style.transform = 'translateY(0) scale(1)';
                box.style.opacity = '1';
                box.style.background = 'rgba(255,215,0,0.15)';
            }, 1500);
        }

        window.onload = () => {
            createStars();
            animateCircles();
        };

    </script>
</body>
</html>
