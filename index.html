<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izmir Soulmate Compass</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@300;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-glow: #ffd700;
            --ivory-silk: #fffaf0;
            --passion-pink: #ff69b4;
            --dark-void: #020000;
            --crimson-mist: #4a0000;
            --thread-red: #ff0000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

        body {
            background: var(--dark-void);
            color: var(--ivory-silk);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark-void);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 2s ease, visibility 2s;
        }

        #intro-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .intro-title {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: var(--gold-glow);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeInOut 4s infinite;
        }

        .intro-hint {
            font-family: 'Cinzel Decorative', serif;
            letter-spacing: 4px;
            font-size: 0.8rem;
            color: #ffb7c5;
            cursor: pointer;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.2; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* --- MAGIC BACKGROUND --- */
        #magic-bg {
            position: fixed;
            inset: -100px;
            z-index: -1;
            background: radial-gradient(circle at center, #1a0505 0%, #020000 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.3); }
            50% { opacity: var(--max-op); transform: scale(1); box-shadow: 0 0 8px white; }
        }

        /* --- UI CONTAINER --- */
        .container {
            width: 95%;
            max-width: 700px;
            background: rgba(15, 2, 2, 0.85);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            text-align: center;
            position: relative;
            z-index: 200;
            max-height: 90vh;
            overflow-y: auto;
            display: none;
        }
        .container.active { display: block; animation: containerAppear 1.5s ease-out; }

        @keyframes containerAppear { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--gold-glow);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .subtitle {
            font-family: 'Pinyon Script', cursive;
            font-size: 1.6rem;
            color: #ffb7c5;
            margin-bottom: 25px;
        }

        /* --- FORM GRID --- */
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            text-align: left; 
        }

        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

        .field label {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.65rem;
            color: var(--gold-glow);
            display: block;
            margin-bottom: 4px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        select {
            width: 100%;
            padding: 10px;
            background: rgba(40, 0, 0, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: var(--ivory-silk);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            outline: none;
            transition: 0.3s;
        }

        select:focus { border-color: var(--gold-glow); background: rgba(60, 0, 0, 0.6); }

        .btn-magic {
            grid-column: 1 / -1;
            padding: 20px;
            margin-top: 15px;
            background: linear-gradient(135deg, #780000, #2b0000);
            border: 1px solid var(--gold-glow);
            border-radius: 50px;
            color: var(--gold-glow);
            font-family: 'Cinzel Decorative', serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .btn-magic:hover { 
            transform: scale(1.02); 
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            letter-spacing: 5px;
        }

        /* --- RESULTS --- */
        #result-card { display: none; }

        .result-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 25px;
            border: 2px solid var(--gold-glow);
            margin-bottom: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            background-color: #1a0505;
        }

        .result-title { 
            font-family: 'Great Vibes', cursive; 
            font-size: 3.2rem; 
            color: var(--gold-glow);
            margin-bottom: 5px;
        }
        
        .result-desc { 
            font-style: italic; 
            color: #ffb7c5; 
            font-size: 1.05rem; 
            line-height: 1.5; 
            margin-bottom: 25px;
            padding: 0 10px;
        }

        /* --- THREAD & PARTICLES --- */
        .thread-node {
            position: fixed; width: 5px; height: 5px;
            background: var(--thread-red); border-radius: 50%;
            pointer-events: none; z-index: 10005;
            box-shadow: 0 0 10px var(--thread-red); transform: translate(-50%, -50%);
            opacity: var(--op);
        }

        .final-particle {
            position: fixed; pointer-events: none; z-index: 10010;
            font-size: 2rem; animation: finalFly 2s cubic-bezier(0.1, 0.5, 0.5, 1) forwards;
        }

        @keyframes finalFly {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--tr)); opacity: 0; }
        }

        .wish-lantern {
            background: linear-gradient(135deg, #ffcc33, #ff6600);
            padding: 20px; border-radius: 50% 50% 15% 15%;
            color: #2d0b0b; font-family: 'Pinyon Script', cursive; font-size: 1.4rem;
            box-shadow: 0 0 40px rgba(255, 150, 0, 0.4);
            max-width: 300px; margin: 30px auto 10px;
            animation: lanternFloat 6s infinite ease-in-out;
            border: 2px solid #ffd700;
        }

        @keyframes lanternFloat { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-20px) rotate(1deg); } }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="startExperience()">
        <div class="intro-title">The Red Thread</div>
        <div class="intro-hint">Click to consult your destiny...</div>
    </div>

    <div id="magic-bg"></div>

    <div class="container" id="main-container">
        <h1>Izmir Soulmate Compass</h1>
        <p class="subtitle">Bound by the red thread of fate...</p>

        <form id="soul-form" class="form-grid">
            <div class="field">
                <label>1. Persona</label>
                <select id="x">
                    <option value="S">Social Student (S)</option>
                    <option value="W">Worker / Professional (W)</option>
                    <option value="A">Refined Adult (A)</option>
                    <option value="N">Nature / Nostalgic (N)</option>
                    <option value="C">Creative Soul (C)</option>
                </select>
            </div>
            <div class="field">
                <label>2. Pulse</label>
                <select id="y">
                    <option value="K">Keen / Chaos (K)</option>
                    <option value="R">Relaxed / Rhythmic (R)</option>
                    <option value="L">Lively / Lounge (L)</option>
                    <option value="Q">Quiet / Silent (Q)</option>
                </select>
            </div>
            <div class="field">
                <label>3. Budget</label>
                <select id="f">
                    <option value="GR">Ground (GR)</option>
                    <option value="ML">Mid-Level (ML)</option>
                    <option value="EX">Executive (EX)</option>
                    <option value="HG">Hidden Gem (HG)</option>
                </select>
            </div>
            <div class="field">
                <label>4. Music</label>
                <select id="m">
                    <option value="J">Jazz / Digital (J)</option>
                    <option value="V">Vocal / Acoustic (V)</option>
                    <option value="U">Urban / Nature (U)</option>
                    <option value="G">Groove / Analog (G)</option>
                </select>
            </div>
            <div class="field">
                <label>5. Style</label>
                <select id="s">
                    <option value="CY">Cyber / City (CY)</option>
                    <option value="BO">Boho (BO)</option>
                    <option value="MN">Minimalist (MN)</option>
                    <option value="CH">Classic Chic (CH)</option>
                </select>
            </div>
            <div class="field">
                <label>6. View</label>
                <select id="p">
                    <option value="OH">Open Horizon (OH)</option>
                    <option value="TX">Texture (TX)</option>
                    <option value="GO">Green Oasis (GO)</option>
                    <option value="PL">Pan. Lights (PL)</option>
                </select>
            </div>
            <div class="field" style="grid-column: span 2;">
                <label>7. Time</label>
                <select id="t">
                    <option value="PM">Nightfall (PM)</option>
                    <option value="AM">Morning (AM)</option>
                </select>
            </div>
            <button type="submit" class="btn-magic">See Your Destiny</button>
        </form>

        <div id="result-card">
            <h2 id="res-name" class="result-title"></h2>
            <img id="res-img" class="result-img" src="" alt="Venue Image" onerror="this.src='https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=800'">
            <p id="res-desc" class="result-desc"></p>
            <button onclick="location.reload()" class="btn-magic" style="width: auto; padding: 15px 45px;">Rediscover</button>
        </div>

        <div class="wish-lantern" id="wish-box">
            <p style="margin-bottom: 10px;">Leave a wish for the Aegean...</p>
            <input type="text" id="wish-text" placeholder="Write your fate..." style="background:none; border:none; border-bottom:1px solid #2d0b0b; width: 85%; text-align:center; outline:none; font-family:'Montserrat'; font-size:0.9rem; color:#2d0b0b;">
            <br>
            <button onclick="sendWish()" style="background:none; border:2px solid #2d0b0b; margin-top:15px; border-radius:20px; padding:8px 20px; font-weight:bold; cursor:pointer; font-family:'Cinzel Decorative'">Send Wish ✨</button>
        </div>
    </div>

    <script>
        // CONFIRMED IMAGES FOR ALL 18 VENUES
        const venues = {
            "KW": { name: "Kordon Sunset Grass", desc: "The iconic sunset spot where students gather on the grass. Lively and sincere.", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800" },
            "RB": { name: "Rock Bridge (K. Park)", desc: "A chance encounter with a rebellious soulmate during a live performance in Kültürpark.", img: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=800" },
            "HG": { name: "Hasanağa Garden", desc: "A serene connection during a morning study session in a green sanctuary.", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800" },
            "MLG": { name: "Mistral Sky Lounge", desc: "An elite networking and meeting point for professionals in a luxury atmosphere.", img: "https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=800" },
            "DG": { name: "Darağaç Art Hub", desc: "A creative and authentic encounter in industrial art studios. Where art meets soul.", img: "https://images.unsplash.com/photo-1513364238172-c8f48117193b?auto=format&fit=crop&w=800" },
            "PP": { name: "Pasaport Pier", desc: "A classic-chic and timeless connection by the sea accompanied by fresh coffee.", img: "https://images.unsplash.com/photo-1521017432531-fbd92d768814?auto=format&fit=crop&w=800" },
            "BS": { name: "Bostanlı Yasemin Terrace", desc: "Capturing a bohemian spark in an acoustic sunset.", img: "https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?auto=format&fit=crop&w=800" },
            "EV": { name: "Edit Vintage (Alsancak)", desc: "Meeting a nostalgic soul while browsing through old vinyl records.", img: "https://images.unsplash.com/photo-1603048588665-791ca8aea617?auto=format&fit=crop&w=800" },
            "AK": { name: "Arkas Art Center", desc: "A sophisticated and cultural meeting ground for art lovers.", img: "https://images.unsplash.com/photo-1561839561-b13bcfe95249?auto=format&fit=crop&w=800" },
            "HE": { name: "Historical Elevator", desc: "A romantic and timeless moment against city lights at the historic elevator.", img: "https://images.unsplash.com/photo-1493134794888-2100c686236e?auto=format&fit=crop&w=800" },
            "KH": { name: "Kızlarağası Coffee", desc: "Authentic textures and a fortune-telling conversation in a traditional atmosphere.", img: "https://images.unsplash.com/photo-1544126592-807daf21565c?auto=format&fit=crop&w=800" },
            "GL": { name: "Göztepe Old Lanes", desc: "A nostalgic and warm evening walk for neighbors who love history.", img: "https://images.unsplash.com/photo-1449156001935-d2861525a591?auto=format&fit=crop&w=800" },
            "UV": { name: "Urla Vineyard Way", desc: "A high-end getaway in the lap of nature for refined souls.", img: "https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?auto=format&fit=crop&w=800" },
            "IC": { name: "İnciraltı Nostalgic Cinema", desc: "Meeting a nature-loving soul under the stars at an open-air cinema.", img: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=800" },
            "BT": { name: "Balçova Therapy Hike", desc: "Meeting a wellness-loving partner during a morning hike.", img: "https://images.unsplash.com/photo-1551632432-c735e7a030ed?auto=format&fit=crop&w=800" },
            "AV": { name: "Alaçatı Stone Streets", desc: "A fashion-forward encounter in a luxury and bohemian environment.", img: "https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=800" },
            "BC": { name: "Bayraklı Cyber Coast", desc: "Meeting point for modern night owls in the digital city center.", img: "https://images.unsplash.com/photo-1493238792040-d710d73aa993?auto=format&fit=crop&w=800" },
            "KP": { name: "Karşıyaka Passage Cafes", desc: "Retro-spirited friends connecting in hidden analog venues.", img: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?auto=format&fit=crop&w=800" }
        };

        function findDestiny(selections) {
            const { x, y, f, m, s, p, t } = selections;
            // 18 STRICT LOGIC PATHS
            if (x==='S' && y==='K' && f==='GR' && m==='J' && s==='CY' && p==='OH' && t==='PM') return venues.KW;
            if (x==='S' && y==='R' && f==='ML' && m==='V' && s==='CY' && p==='TX' && t==='PM') return venues.RB;
            if (x==='S' && y==='Q' && f==='GR' && m==='U' && s==='BO' && p==='GO' && t==='AM') return venues.HG;
            if (x==='W' && y==='L' && f==='EX' && m==='J' && s==='MN' && p==='PL' && t==='PM') return venues.MLG;
            if (x==='C' && y==='Q' && f==='HG' && m==='G' && s==='BO' && p==='TX' && t==='PM') return venues.DG;
            if (x==='W' && y==='Q' && f==='ML' && m==='V' && s==='CH' && p==='OH' && t==='AM') return venues.PP;
            if (x==='C' && y==='R' && f==='ML' && m==='U' && s==='BO' && p==='OH' && t==='PM') return venues.BS;
            if (x==='N' && y==='R' && f==='GR' && m==='V' && s==='BO' && p==='TX' && t==='PM') return venues.EV;
            if (x==='C' && y==='Q' && f==='EX' && m==='U' && s==='MN' && p==='PL' && t==='AM') return venues.AK;
            if (x==='N' && y==='L' && f==='EX' && m==='G' && s==='CH' && p==='PL' && t==='PM') return venues.HE;
            if (x==='N' && y==='Q' && f==='GR' && m==='G' && s==='BO' && p==='TX' && t==='AM') return venues.KH;
            if (x==='N' && y==='Q' && f==='HG' && m==='U' && s==='MN' && p==='TX' && t==='PM') return venues.GL;
            if (x==='A' && y==='Q' && f==='EX' && m==='U' && s==='MN' && p==='GO' && t==='PM') return venues.UV;
            if (x==='A' && y==='L' && f==='GR' && m==='G' && s==='BO' && p==='OH' && t==='PM') return venues.IC;
            if (x==='A' && y==='Q' && f==='HG' && m==='U' && s==='MN' && p==='GO' && t==='AM') return venues.BT;
            if (x==='C' && y==='L' && f==='EX' && m==='G' && s==='BO' && p==='TX' && t==='PM') return venues.AV;
            if (x==='W' && y==='K' && f==='ML' && m==='J' && s==='CY' && p==='PL' && t==='PM') return venues.BC;
            if (x==='N' && y==='R' && f==='ML' && m==='G' && s==='CH' && p==='TX' && t==='AM') return venues.KP;

            const defaults = { 'S': venues.KW, 'W': venues.MLG, 'A': venues.UV, 'N': venues.KH, 'C': venues.BS };
            return defaults[x] || venues.KW;
        }

        function startExperience() {
            document.getElementById('intro-overlay').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('main-container').classList.add('active');
            }, 1000);
        }

        function createStars() {
            const bg = document.getElementById('magic-bg');
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px'; star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%'; star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--max-op', Math.random() * 0.7 + 0.2);
                bg.appendChild(star);
            }
        }

        const coords = { x: window.innerWidth/2, y: window.innerHeight/2 };
        const circles = [];
        for (let i = 0; i < 15; i++) {
            const div = document.createElement('div');
            div.className = 'thread-node';
            div.style.setProperty('--op', (15 - i) / 15);
            document.body.appendChild(div);
            circles.push({ x: coords.x, y: coords.y, element: div });
        }
        window.addEventListener("mousemove", (e) => { coords.x = e.clientX; coords.y = e.clientY; });

        function animateCircles() {
            let x = coords.x; let y = coords.y;
            circles.forEach((c, index) => {
                c.element.style.left = x + "px"; c.element.style.top = y + "px";
                c.x = x; c.y = y;
                const next = circles[index + 1] || circles[0];
                x += (next.x - x) * 0.25; y += (next.y - y) * 0.25;
            });
            requestAnimationFrame(animateCircles);
        }

        document.getElementById('soul-form').onsubmit = (e) => {
            e.preventDefault();
            const selections = {
                x: document.getElementById('x').value,
                y: document.getElementById('y').value,
                f: document.getElementById('f').value,
                m: document.getElementById('m').value,
                s: document.getElementById('s').value,
                p: document.getElementById('p').value,
                t: document.getElementById('t').value
            };
            const match = findDestiny(selections);
            document.getElementById('soul-form').style.display = 'none';
            document.querySelector('.subtitle').style.display = 'none';
            document.getElementById('result-card').style.display = 'block';
            document.getElementById('res-name').innerText = match.name;
            document.getElementById('res-img').src = match.img;
            document.getElementById('res-desc').innerText = match.desc;
            createExplosion();
        };

        function createExplosion() {
            const symbols = ['❤', '✨', '🧿', '🌊', '🍷'];
            for(let i=0; i<45; i++) {
                const p = document.createElement('div');
                p.className = 'final-particle';
                p.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                p.style.left = '50%'; p.style.top = '50%';
                p.style.setProperty('--tx', (Math.random() - 0.5) * 800 + 'px');
                p.style.setProperty('--ty', (Math.random() - 0.5) * 800 + 'px');
                p.style.setProperty('--tr', Math.random() * 1080 + 'deg');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }

        function sendWish() {
            const box = document.getElementById('wish-box');
            if(!document.getElementById('wish-text').value) return;
            box.style.transition = '2s cubic-bezier(0.4, 0, 0.2, 1)';
            box.style.transform = 'translateY(-1200px) scale(0) rotate(45deg)';
            box.style.opacity = '0';
            setTimeout(() => {
                box.innerHTML = "<p style='font-size:1.1rem; color:#ffd700'>Echoing in the waters of the Aegean... ✨</p>";
                box.style.transform = 'translateY(0) scale(1) rotate(0)';
                box.style.opacity = '1';
                box.style.background = 'rgba(255,215,0,0.05)';
            }, 1800);
        }

        window.onload = () => { createStars(); animateCircles(); };
    </script>
</body>
</html>
